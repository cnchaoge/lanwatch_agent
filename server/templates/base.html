<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Lanwatch - 企业网络监控平台{% endblock %}</title>
<style>
/* 基础变量：对应 theme.css 的 [data-theme="light"] 默认值，供尚未加载 theme.css 的元素使用 */
:root, [data-theme="light"] {
  --bg-primary: #f4f6fb;
  --bg-secondary: #eaecf4;
  --bg-tertiary: #e2e5ef;
  --bg-card: #ffffff;
  --border: rgba(0,0,0,0.09);
  --border-light: rgba(0,0,0,0.14);
  --text-primary: #111827;
  --text-secondary: #6b7280;
  --text-muted: #9ca3af;
  --accent-blue: #2563eb;
  --accent-green: #22c55e;
  --accent-yellow: #f59e0b;
  --accent-red: #ef4444;
  --accent-purple: #7c3aed;
  --accent-orange: #f97316;
}

[data-theme="dark"] {
  --bg-primary: #0d1117;
  --bg-secondary: #161b22;
  --bg-tertiary: #21262d;
  --bg-card: #1c2128;
  --border: #30363d;
  --border-light: #3d444d;
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --text-muted: #6e7681;
  --accent-blue: #58a6ff;
  --accent-green: #3fb950;
  --accent-yellow: #d29922;
  --accent-red: #f85149;
  --accent-purple: #a371f7;
  --accent-orange: #db6d28;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.6;
}

/* ===== 顶部导航 ===== */
.navbar {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
}

.navbar-brand {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 18px;
  font-weight: 700;
  color: var(--accent-blue);
  text-decoration: none;
}

.navbar-nav { display: flex; align-items: center; gap: 4px; }

.nav-item {
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  cursor: pointer;
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
  border: none;
  background: none;
}

.nav-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }
.nav-item.active { background: rgba(88,166,255,0.15); color: var(--accent-blue); }

.status-indicator {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  background: rgba(63,185,80,0.12);
  color: var(--accent-green);
  border: 1px solid rgba(63,185,80,0.3);
}

.status-indicator.warning {
  background: rgba(210,153,34,0.12);
  color: var(--accent-yellow);
  border-color: rgba(210,153,34,0.3);
}

.status-indicator.error {
  background: rgba(248,81,73,0.12);
  color: var(--accent-red);
  border-color: rgba(248,81,73,0.3);
}

.status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

/* 汉堡菜单 */
.hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 8px; background: none; border: none; }
.hamburger span { width: 22px; height: 2px; background: var(--text-secondary); border-radius: 2px; transition: all 0.3s; }

.mobile-nav { display: none; position: fixed; inset: 60px 0 0 0; background: var(--bg-secondary); padding: 16px; flex-direction: column; gap: 4px; border-top: 1px solid var(--border); z-index: 99; }
.mobile-nav.show { display: flex; }
.mobile-nav .nav-item { padding: 14px 16px; font-size: 16px; border-radius: var(--radius-md); }

/* ===== 主容器 ===== */
.container { max-width: 1440px; margin: 0 auto; padding: 24px; }

/* ===== 页面标题 ===== */
.page-header { margin-bottom: 24px; }
.page-title { font-size: 24px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
.page-subtitle { font-size: 14px; color: var(--text-secondary); }

/* ===== 统计卡片 ===== */
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }

.stat-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: 20px 24px; position: relative; overflow: hidden; transition: all 0.2s;
}
.stat-card:hover { border-color: var(--border-light); transform: translateY(-2px); box-shadow: var(--shadow); }
.stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: var(--radius-lg) var(--radius-lg) 0 0; }
.stat-card.blue::before { background: var(--accent-blue); }
.stat-card.green::before { background: var(--accent-green); }
.stat-card.yellow::before { background: var(--accent-yellow); }
.stat-card.red::before { background: var(--accent-red); }
.stat-card.purple::before { background: var(--accent-purple); }

.stat-label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.stat-value { font-size: 36px; font-weight: 800; color: var(--text-primary); line-height: 1.1; font-variant-numeric: tabular-nums; }
.stat-trend { font-size: 12px; margin-top: 8px; display: flex; align-items: center; gap: 4px; }
.stat-trend.up { color: var(--accent-green); }
.stat-trend.down { color: var(--accent-red); }
.stat-icon { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); font-size: 36px; opacity: 0.15; }

/* ===== 卡片 ===== */
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 20px; overflow: hidden; transition: all 0.2s; }
.card:hover { border-color: var(--border-light); }
.card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--bg-secondary); }
.card-title { font-size: 15px; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; gap: 8px; }
.card-body { padding: 20px; }

/* ===== 按钮 ===== */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid transparent; transition: all 0.15s; text-decoration: none; }
.btn-primary { background: var(--accent-blue); color: #fff; border-color: var(--accent-blue); }
.btn-primary:hover { background: #4c9aed; }
.btn-secondary { background: var(--bg-tertiary); color: var(--text-primary); border-color: var(--border); }
.btn-secondary:hover { background: var(--border); }
.btn-danger { background: rgba(248,81,73,0.1); color: var(--accent-red); border-color: rgba(248,81,73,0.3); }
.btn-danger:hover { background: rgba(248,81,73,0.2); }
.btn-sm { padding: 5px 10px; font-size: 12px; }

/* ===== 表格 ===== */
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 10px 16px; font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); background: var(--bg-secondary); }
td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid var(--border); color: var(--text-primary); }
tr:last-child td { border-bottom: none; }
tbody tr { transition: background 0.15s; }
tbody tr:hover { background: rgba(255,255,255,0.03); }

.online-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.online-dot.online { background: var(--accent-green); box-shadow: 0 0 6px var(--accent-green); }
.online-dot.offline { background: var(--text-muted); }
.online-dot.warn { background: var(--accent-yellow); box-shadow: 0 0 6px var(--accent-yellow); }

/* ===== 搜索 / 筛选 ===== */
.search-bar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.search-input { flex: 1; min-width: 200px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 14px; color: var(--text-primary); font-size: 14px; outline: none; }
.search-input:focus { border-color: var(--accent-blue); }
.search-input::placeholder { color: var(--text-muted); }

.device-type-badge { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; background: var(--bg-tertiary); color: var(--text-secondary); }
.device-type-badge.router { background: rgba(88,166,255,0.15); color: var(--accent-blue); }
.device-type-badge.switch { background: rgba(63,185,80,0.15); color: var(--accent-green); }
.device-type-badge.firewall { background: rgba(248,81,73,0.15); color: var(--accent-red); }
.device-type-badge.server { background: rgba(163,113,247,0.15); color: var(--accent-purple); }

/* ===== 告警 ===== */
.alert-list { display: flex; flex-direction: column; }
.alert-item { display: flex; align-items: flex-start; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--border); transition: background 0.15s; }
.alert-item:last-child { border-bottom: none; }
.alert-body { flex: 1; }
.alert-title { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 2px; }
.alert-desc { font-size: 13px; color: var(--text-secondary); }
.alert-meta { display: flex; gap: 12px; font-size: 12px; color: var(--text-muted); margin-top: 4px; }
.alert-time { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
.alert-level-critical { border-left: 3px solid var(--accent-red); padding-left: 12px; }
.alert-level-warning { border-left: 3px solid var(--accent-yellow); padding-left: 12px; }
.alert-level-info { border-left: 3px solid var(--accent-blue); padding-left: 12px; }

/* ===== 空状态 / 加载骨架 ===== */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
.empty-state .icon { font-size: 52px; margin-bottom: 16px; opacity: 0.6; }
.empty-state .title { font-size: 18px; font-weight: 600; color: var(--text-primary); margin-bottom: 8px; }

.skeleton { background: linear-gradient(90deg, var(--bg-tertiary) 25%, var(--bg-card) 50%, var(--bg-tertiary) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: var(--radius-sm); }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.skeleton-text { height: 14px; margin-bottom: 8px; }

/* ===== 弹窗 ===== */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
.modal-overlay.show { display: flex; }
.modal { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); width: 90%; max-width: 640px; max-height: 85vh; overflow-y: auto; box-shadow: var(--shadow); animation: modalIn 0.2s ease-out; }
@keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(-10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
.modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--bg-secondary); }
.modal-title { font-size: 18px; font-weight: 700; }
.modal-close { width: 32px; height: 32px; border-radius: var(--radius-sm); background: var(--bg-tertiary); border: 1px solid var(--border); color: var(--text-secondary); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.modal-close:hover { background: var(--border); color: var(--text-primary); }
.modal-body { padding: 24px; }

/* ===== Tabs ===== */
.tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; overflow-x: auto; }
.tab { padding: 12px 20px; color: var(--text-secondary); cursor: pointer; border-bottom: 2px solid transparent; font-size: 14px; font-weight: 500; transition: all 0.15s; white-space: nowrap; background: none; border-top: none; border-left: none; border-right: none; }
.tab:hover { color: var(--text-primary); }
.tab.active { color: var(--accent-blue); border-bottom-color: var(--accent-blue); }

/* ===== Toast ===== */
#toast { position: fixed; bottom: 24px; right: 24px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 12px 20px; display: none; z-index: 3000; font-size: 14px; font-weight: 500; box-shadow: var(--shadow); animation: toastIn 0.3s ease-out; max-width: 360px; }
#toast.show { display: flex; align-items: center; gap: 10px; }
@keyframes toastIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
#toast.success { border-color: var(--accent-green); color: var(--accent-green); }
#toast.error { border-color: var(--accent-red); color: var(--accent-red); }
#toast.info { border-color: var(--accent-blue); color: var(--accent-blue); }

/* ===== 进度条 ===== */
.progress-bar { height: 6px; background: var(--bg-tertiary); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
.progress-fill.green { background: var(--accent-green); }
.progress-fill.yellow { background: var(--accent-yellow); }
.progress-fill.red { background: var(--accent-red); }

/* ===== 过滤标签 ===== */
.filter-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.filter-tab { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; background: var(--bg-tertiary); color: var(--text-secondary); border: 1px solid var(--border); transition: all 0.15s; }
.filter-tab:hover { border-color: var(--border-light); color: var(--text-primary); }
.filter-tab.active { background: rgba(88,166,255,0.15); color: var(--accent-blue); border-color: rgba(88,166,255,0.3); }

/* ===== 设备详情 ===== */
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.detail-item { background: var(--bg-primary); border-radius: var(--radius-sm); padding: 12px 14px; }
.detail-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }
.detail-value { font-size: 14px; color: var(--text-primary); font-weight: 600; font-family: monospace; }

/* ===== 响应式 ===== */
@media (max-width: 1024px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 768px) {
  .stats-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
  .stat-card { padding: 16px; }
  .stat-value { font-size: 28px; }
  .navbar-nav { display: none; }
  .hamburger { display: flex; }
  .container { padding: 16px; }
  .detail-grid { grid-template-columns: 1fr; }
}
@media (max-width: 480px) { .stats-grid { grid-template-columns: 1fr; } }
</style>
<link rel="stylesheet" href="/static/theme.css">
{% block head_extra %}{% endblock %}
</head>
<body>

<!-- 顶部导航 -->
<nav class="navbar">
  {% block navbar_brand %}
  <a class="navbar-brand" href="/">
    <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
    </svg>
    Lanwatch
  </a>
  {% endblock %}

  <div class="navbar-nav" id="desktop-nav">
    {% block nav_items %}
    {% endblock %}
  </div>

  <div id="global-status"></div>
  <button class="hamburger" onclick="toggleMobileNav()">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- 移动端导航 -->
<div class="mobile-nav" id="mobile-nav">
  {% block mobile_nav_items %}
  {% endblock %}
</div>

{% block content %}{% endblock %}

<!-- Toast -->
<div id="toast"></div>

<script>
const API_BASE = window.location.origin;

async function api(url, options = {}) {
  try {
    const r = await fetch(API_BASE + url, options);
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || data.detail || '请求失败');
    return data;
  } catch (e) { toast(e.message, 'error'); throw e; }
}

function toast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  setTimeout(() => t.classList.remove('show'), 3500);
}

function toggleMobileNav() {
  document.getElementById('mobile-nav').classList.toggle('show');
}

function formatTime(ts) {
  if (!ts) return '-';
  const d = new Date(ts);
  const diff = Date.now() - d.getTime();
  if (diff < 60000) return '刚刚';
  if (diff < 3600000) return Math.floor(diff/60000) + ' 分钟前';
  if (diff < 86400000) return Math.floor(diff/3600000) + ' 小时前';
  return d.toLocaleDateString();
}

// Theme init
(function(){
  var stored = localStorage.getItem('lw-theme') || 'light';
  document.documentElement.setAttribute('data-theme', stored);
})();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
