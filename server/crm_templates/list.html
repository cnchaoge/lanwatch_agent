<!DOCTYPE html>
<html lang="zh" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客户管理 - LANWatch</title>
<link rel="stylesheet" href="/static/theme.css">
<style>
body { background: var(--bg); min-height: 100vh; }
.page-header { display: flex; align-items: center; justify-content: space-between; padding: 32px 0 24px; flex-wrap: wrap; gap: 12px; }
.page-header h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.03em; }
.page-header p { font-size: 13px; color: var(--muted); }
.header-actions { display: flex; align-items: center; gap: 8px; }

/* ─── Table ─── */
.table-wrap { background: var(--surface-solid); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow); overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
thead tr { background: var(--bg-2); border-bottom: 1px solid var(--border); }
th { padding: 12px 16px; font-size: 12px; font-weight: 700; color: var(--muted); text-align: left; white-space: nowrap; }
td { padding: 14px 16px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover { background: var(--surface); }
.col-name { font-weight: 600; }
.col-company { color: var(--muted); }
.col-contact { font-size: 12px; }
.col-actions { white-space: nowrap; }
a.edit-link { color: var(--primary); font-weight: 600; font-size: 12px; }
a.edit-link:hover { text-decoration: underline; }
a.delete-link { color: var(--red); font-weight: 600; font-size: 12px; margin-left: 10px; }
a.delete-link:hover { text-decoration: underline; }
.empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }
.empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
.tag { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
.tag-grey { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }

@media (max-width: 768px) {
  .hide-mobile { display: none; }
  td, th { padding: 10px 12px; }
}
</style>
</head>
<body>

<div class="nav">
  <div class="container nav-inner">
    <div class="nav-brand">
      <div class="nav-icon">L</div>
      <span>LANWatch</span>
    </div>
    <div class="nav-links">
      <a href="/admin">设备</a>
      <a href="/crm">客户</a>
    </div>
  </div>
</div>

<div class="container">
  <div class="page-header">
    <div>
      <h1>客户管理</h1>
      <p>共 <span id="total">-</span> 位客户</p>
    </div>
    <div class="header-actions">
      <a href="/customer/new" class="btn btn-primary">+ 新增客户</a>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>姓名</th>
          <th class="hide-mobile">公司</th>
          <th class="hide-mobile">电话</th>
          <th class="hide-mobile">邮箱</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="customer-list">
        <tr><td colspan="5" class="empty">加载中...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
async function loadCustomers() {
  try {
    const res = await fetch('/api/customers');
    const data = await res.json();
    document.getElementById('total').textContent = data.length;
    const tbody = document.getElementById('customer-list');
    if (!data.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty"><div class="empty-icon">📋</div>暂无客户，点击右上角添加第一位客户</td></tr>';
      return;
    }
    tbody.innerHTML = data.map(c => `
      <tr>
        <td class="col-name">${escapeHtml(c.name)}</td>
        <td class="col-company hide-mobile">${escapeHtml(c.company || '—')}</td>
        <td class="col-contact hide-mobile">${escapeHtml(c.phone || '—')}</td>
        <td class="col-contact hide-mobile">${escapeHtml(c.email || '—')}</td>
        <td class="col-actions">
          <a href="/customer/${c.id}/edit" class="edit-link">编辑</a>
          <a href="/customer/${c.id}/delete" class="delete-link" onclick="return confirm('确定删除该客户？')">删除</a>
        </td>
      </tr>
    `).join('');
  } catch (e) {
    document.getElementById('customer-list').innerHTML = '<tr><td colspan="5" class="empty">加载失败</td></tr>';
  }
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadCustomers();
</script>
</body>
</html>
