<!DOCTYPE html>
<html lang="zh" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>掉线检测详情 - LANWatch</title>
<link rel="stylesheet" href="/static/theme.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
body { background: var(--bg); min-height: 100vh; }
.container { max-width: 900px; margin: 0 auto; padding: 24px 20px; }

.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.page-header h1 { font-size: 20px; font-weight: 800; }
.back-btn { font-size: 13px; color: var(--primary); text-decoration: none; }
.back-btn:hover { text-decoration: underline; }

.info-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
.info-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; }
.info-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
.info-value { font-size: 16px; font-weight: 700; }

.chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 20px; }
.chart-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
.chart-wrap { position: relative; height: 220px; }

.loading { text-align: center; padding: 40px; color: var(--muted); }

.nav { background: var(--surface-solid); border-bottom: 1px solid var(--border); padding: 0 20px; }
.nav-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; gap: 20px; height: 52px; }
.nav-brand { display: flex; align-items: center; gap: 8px; text-decoration: none; font-weight: 800; font-size: 15px; color: var(--text); }
.nav-icon { width: 28px; height: 28px; background: var(--primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 13px; font-weight: 800; }
.nav-links { display: flex; gap: 16px; margin-left: auto; }
.nav-links a { font-size: 13px; color: var(--muted); text-decoration: none; }
.nav-links a:hover { color: var(--text); }

.btn { display: inline-block; padding: 7px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; text-decoration: none; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-secondary { background: var(--surface-hover); color: var(--text); border: 1px solid var(--border); }
.btn-danger { background: #ef4444; color: #fff; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-brand">
      <span class="nav-icon">L</span>
      <span>LANWatch</span>
    </a>
    <div class="nav-links">
      <a href="/">首页</a>
      <a href="/#download">下载</a>
      <a href="/admin">管理后台</a>
    </div>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h1 id="pageTitle">掉线检测详情</h1>
    <a class="back-btn" href="/">← 返回首页</a>
  </div>

  <div id="loading" class="loading">加载中...</div>
  <div id="content" style="display:none">

    <!-- Info cards -->
    <div class="info-grid" id="infoGrid"></div>

    <!-- Actions -->
    <div style="margin-bottom:24px;display:flex;gap:10px;">
      <button class="btn btn-secondary btn-sm" onclick="testNow()">🔄 立即测试</button>
      <button class="btn btn-secondary btn-sm" onclick="toggleEnabled()">⏸ 启用/禁用</button>
      <button class="btn btn-danger btn-sm" onclick="deleteMonitor()">🗑 删除</button>
    </div>

    <!-- Latency chart -->
    <div class="chart-card">
      <div class="chart-title">📈 延迟趋势（最近24小时）</div>
      <div class="chart-wrap">
        <canvas id="rttChart"></canvas>
      </div>
    </div>

    <!-- Availability chart -->
    <div class="chart-card">
      <div class="chart-title">✅ 可用率（最近7天）</div>
      <div class="chart-wrap">
        <canvas id="upChart"></canvas>
      </div>
    </div>

  </div>
</div>

<script>
var SERVER = location.origin;
var monitorId = parseInt(location.pathname.split('/').pop());
var currentMonitor = null;
var rttChart = null;
var upChart = null;

function timeAgo(ts) {
  if (!ts) return '无数据';
  var s = Math.floor(Date.now()/1000 - ts);
  if (s < 60) return s + '秒前';
  if (s < 3600) return Math.floor(s/60) + '分钟前';
  if (s < 86400) return Math.floor(s/3600) + '小时前';
  return Math.floor(s/86400) + '天前';
}

function load() {
  fetch(SERVER + '/api/admin/ping').then(function(r){ return r.json(); }).then(function(monitors) {
    var m = monitors.find(function(x){ return x.id === monitorId; });
    if (!m) { document.getElementById('loading').textContent = '未找到该监控目标'; return; }
    currentMonitor = m;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    document.title = (m.name || m.ip) + ' - 掉线检测详情 - LANWatch';
    document.getElementById('pageTitle').textContent = m.name || m.ip;
    renderInfo(m);
    loadHistory();
  });
}

function renderInfo(m) {
  var isOnline = m.status === 'online';
  var html = '<div class="info-card">' +
    '<div class="info-label">IP地址</div>' +
    '<div class="info-value" style="font-family:Menlo,monospace">' + m.ip + '</div>' +
  '</div>' +
  '<div class="info-card">' +
    '<div class="info-label">监控状态</div>' +
    '<div class="info-value" style="color:var(--' + (isOnline ? 'green' : 'red') + ')">' + (isOnline ? '● 在线' : '● 离线') + '</div>' +
  '</div>';
  if (m.last_seen) {
    html += '<div class="info-card">' +
      '<div class="info-label">最后在线</div>' +
      '<div class="info-value" style="font-size:14px">' + timeAgo(m.last_seen) + '</div>' +
    '</div>';
  }
  if (m.interval_sec) {
    html += '<div class="info-card">' +
      '<div class="info-label">检测间隔</div>' +
      '<div class="info-value" style="font-size:14px">' + m.interval_sec + '秒</div>' +
    '</div>';
  }
  html += '<div class="info-card">' +
    '<div class="info-label">启用状态</div>' +
    '<div class="info-value" style="font-size:14px">' + (m.enabled ? '✓ 启用' : '✗ 禁用') + '</div>' +
  '</div>';
  if (m.created_at) {
    html += '<div class="info-card">' +
      '<div class="info-label">创建时间</div>' +
      '<div class="info-value" style="font-size:14px">' + timeAgo(m.created_at) + '</div>' +
    '</div>';
  }
  document.getElementById('infoGrid').innerHTML = html;
}

function loadHistory() {
  fetch(SERVER + '/api/admin/ping/' + monitorId + '/history').then(function(r){ return r.json(); }).then(function(data) {
    renderRttChart(data.rtt_history || []);
    renderUpChart(data.up_history || []);
  }).catch(function() {
    // No history yet, that's ok
  });
}

function renderRttChart(rttHistory) {
  var ctx = document.getElementById('rttChart').getContext('2d');
  var labels = rttHistory.map(function(p){ return new Date(p.ts * 1000).toLocaleString('zh-CN', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}); });
  var data = rttHistory.map(function(p){ return p.rtt_ms; });
  if (rttChart) rttChart.destroy();
  rttChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: '延迟 (ms)',
        data: data,
        borderColor: '#3b82f6',
        backgroundColor: 'rgba(59,130,246,0.1)',
        fill: true,
        tension: 0.3,
        pointRadius: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { display: true, ticks: { maxTicksLimit: 8 } },
        y: { display: true, beginAtZero: true }
      }
    }
  });
}

function renderUpChart(upHistory) {
  var ctx = document.getElementById('upChart').getContext('2d');
  var labels = upHistory.map(function(p){ return new Date(p.ts * 1000).toLocaleString('zh-CN', {month:'2-digit',day:'2-digit'}); });
  var data = upHistory.map(function(p){ return p.up_pct; });
  if (upChart) upChart.destroy();
  upChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: '可用率 (%)',
        data: data,
        backgroundColor: data.map(function(v){ return v < 50 ? '#ef4444' : (v < 80 ? '#f59e0b' : '#22c55e'); }),
        borderRadius: 4
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { display: true },
        y: { display: true, beginAtZero: true, max: 100 }
      }
    }
  });
}

function testNow() {
  fetch(SERVER + '/api/admin/ping/' + monitorId + '/test', {method:'POST'}).then(function(r){ return r.json(); }).then(function(d) {
    alert('Ping ' + d.ip + ': ' + (d.online ? '✅ 在线 (' + d.rtt_ms + 'ms)' : '❌ 离线'));
    load();
  });
}

function toggleEnabled() {
  if (!currentMonitor) return;
  var enabled = currentMonitor.enabled ? 0 : 1;
  fetch(SERVER + '/api/admin/ping/' + monitorId, {
    method: 'PATCH',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({enabled: enabled})
  }).then(function(r){ return r.json(); }).then(function() { load(); });
}

function deleteMonitor() {
  if (!confirm('确定删除该监控目标吗？')) return;
  fetch(SERVER + '/api/admin/ping/' + monitorId, {method:'DELETE'}).then(function(r){ return r.json(); }).then(function() {
    alert('已删除');
    location.href = '/';
  });
}

load();
</script>
</body>
</html>
