<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注册 - lanwatch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #050810; --bg2: #0a0f1e; --bg3: #0f1629; --surface: #111827;
  --border: #1e2d4a; --accent: #00e5cc; --accent2: #3b82f6;
  --text: #f0f4ff; --text2: #94a3b8; --text3: #4b5d72;
  --green: #10b981; --red: #ef4444; --orange: #f59e0b; --radius: 16px;
}
body {
  font-family: 'Manrope', -apple-system, sans-serif;
  background: var(--bg); color: var(--text);
  padding: 20px 16px; min-height: 100vh; max-width: 480px; margin: 0 auto;
}
a { text-decoration: none; color: inherit; }

.topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
.topbar .logo { font-size: 16px; font-weight: 800; display: flex; align-items: center; gap: 6px; }
.topbar .logo .dot { color: var(--accent); font-size: 20px; }
.topbar .logo span { background: linear-gradient(135deg,#fff,#94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px 20px; margin-bottom: 14px; }
.card-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
.form-row { margin-bottom: 14px; }
.form-row label { display: block; font-size: 12px; color: var(--text3); margin-bottom: 6px; }
.form-row input, .form-row select {
  width: 100%; padding: 11px 14px; background: var(--bg2); color: var(--text);
  border: 1px solid var(--border); border-radius: 10px; font-size: 14px;
  font-family: 'Manrope', sans-serif; outline: none;
  transition: border-color 0.2s;
}
.form-row input:focus { border-color: var(--accent); }
.form-row input::placeholder { color: var(--text3); }
.btn {
  display: block; width: 100%;
  background: var(--accent); color: #000; font-size: 15px; font-weight: 700;
  padding: 13px; border-radius: 10px; border: none; cursor: pointer;
  font-family: 'Manrope', sans-serif; margin-top: 6px;
  transition: all 0.2s;
}
.btn:hover { opacity: 0.85; }
.btn:disabled { background: var(--text3); cursor: not-allowed; }
.btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); font-size: 13px; padding: 10px; }
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
.success-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px 24px; text-align: center; }
.success-icon { width: 60px; height: 60px; background: var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 18px; font-size: 30px; color: #fff; box-shadow: 0 0 24px rgba(16,185,129,0.4); }
.success-card h2 { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
.success-card > p { font-size: 13px; color: var(--text3); margin-bottom: 16px; }
.token-box { background: var(--bg2); border-radius: 10px; padding: 14px; font-size: 12px; font-family: monospace; word-break: break-all; color: var(--accent); margin: 12px 0; text-align: left; line-height: 1.7; }
.note { background: rgba(0,229,204,0.05); border: 1px solid rgba(0,229,204,0.2); border-radius: 10px; padding: 12px 14px; font-size: 12px; color: var(--accent); line-height: 1.7; margin-top: 12px; text-align: left; }
.note strong { color: var(--accent); }
.hidden { display: none; }
.error-msg { color: #f87171; font-size: 12px; margin-top: 8px; text-align: center; }
.foot { text-align: center; font-size: 11px; color: var(--text3); padding: 16px 0; border-top: 1px solid var(--border); margin-top: 20px; line-height: 2; }
.foot a { color: var(--accent2); }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"><span class="dot">◉</span><span>lanwatch</span></div>
</div>

<!-- 注册表单 -->
<div id="view-form">
  <div class="card">
    <div class="card-title">创建企业账号</div>
    <div class="form-row">
      <label>企业名称 *</label>
      <input type="text" id="input-name" placeholder="例如：沧州艾欧特科技服务有限公司" value="">
    </div>
    <div class="form-row">
      <label>联系电话（选填）</label>
      <input type="tel" id="input-phone" placeholder="用于接收报警通知" value="">
    </div>
    <button class="btn" id="btn-submit" onclick="doRegister()">立即注册</button>
    <p style="font-size:12px;color:var(--text3);margin-top:12px;text-align:center;">
      已有账号？<a href="/mobile" style="color:var(--accent2);">直接登录</a>
    </p>
  </div>
</div>

<!-- 注册成功 -->
<div id="view-success" class="hidden">
  <div class="success-card">
    <div class="success-icon">✓</div>
    <h2>注册成功！</h2>
    <p>请保存好您的 Token（下次登录手机端需要）</p>
    <div class="token-box" id="show-token"></div>
    <div class="token-box" id="show-agent-id" style="font-size:11px;color:var(--text3);margin-top:6px;"></div>
    <p style="font-size:12px;color:var(--text3);margin-bottom:16px;">点击下方按钮，复制 Token 并下载安装包</p>
    <button class="btn" id="btn-copy" onclick="copyAndDownload()">复制 Token → 下载安装包</button>
  </div>

  <div class="card" style="margin-top:14px;">
    <div class="card-title">安装后做什么</div>
    <div style="font-size:13px;color:var(--text2);line-height:2;">
      1. 下载并运行安装包<br>
      2. 填写企业名称完成注册<br>
      3. 返回此页面点击「复制 Token」<br>
      4. 打开手机端 <a href="/mobile" style="color:var(--accent2);">手机端</a> 粘贴 Token 登录
    </div>
    <div class="note">
      💡 <strong>提示：</strong>Token 是您唯一的登录凭证，丢失后无法找回，请妥善保存。
    </div>
  </div>
</div>

<script>
var SERVER = location.origin;
var REGISTERED_TOKEN = null;

async function doRegister() {
  var name = document.getElementById('input-name').value.trim();
  var phone = document.getElementById('input-phone').value.trim();
  if (!name) { alert('请填写企业名称'); return; }

  var btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.textContent = '注册中...';

  try {
    var resp = await fetch(SERVER + '/api/register', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name: name, phone: phone})
    });
    var data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || '注册失败');

    REGISTERED_TOKEN = data.token;
    document.getElementById('show-token').textContent = data.token;
    if (data.agent_id) {
      document.getElementById('show-agent-id').textContent = '设备ID：' + data.agent_id;
    }
    document.getElementById('view-form').classList.add('hidden');
    document.getElementById('view-success').classList.remove('hidden');
  } catch(e) {
    alert('注册失败: ' + e.message);
    btn.disabled = false;
    btn.textContent = '立即注册';
  }
}

function copyAndDownload() {
  var token = document.getElementById('show-token').textContent;
  navigator.clipboard.writeText(token).then(function() {
    window.location.href = '/static/lanwatch_agent.exe';
  }).catch(function() {
    prompt('复制以下 Token 后将自动下载安装包：', token);
    window.location.href = '/static/lanwatch_agent.exe';
  });
}
</script>

<div class="foot">
  <a href="/">首页</a> · <a href="/download">下载</a> · <a href="/mobile">手机端</a><br>
  © 2026 lanwatch.net · 企业网络值守服务
</div>

</body>
</html>
