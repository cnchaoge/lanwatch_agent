<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注册账号 - LANWatch</title>
<link rel="stylesheet" href="/static/theme.css">
<style>
body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

.page-wrap { max-width: 480px; margin: 0 auto; padding: 0 16px; }

/* ─── Card / Form ─── */
.reg-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 28px 24px; margin-bottom: 16px;
}
.reg-card h2 {
  font-size: 20px; font-weight: 700; margin-bottom: 20px;
  display: flex; align-items: center; gap: 8px;
}
.form-row { margin-bottom: 16px; }
.form-row label {
  display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; font-weight: 500;
}
.form-row input {
  width: 100%; padding: 10px 14px;
  background: var(--input-bg); color: var(--text);
  border: 1px solid var(--border); border-radius: 10px;
  font-size: 14px; font-family: var(--font); outline: none;
  transition: border-color 0.2s;
}
.form-row input:focus { border-color: var(--accent); }
.form-row input::placeholder { color: var(--muted); }

/* ─── Button ─── */
.btn-reg {
  display: block; width: 100%; background: var(--accent); color: #fff;
  font-size: 15px; font-weight: 600; padding: 13px; border-radius: 10px;
  border: none; cursor: pointer; font-family: var(--font);
  transition: opacity 0.2s; margin-top: 8px;
}
.btn-reg:hover { opacity: 0.88; }
.btn-reg:disabled { background: var(--muted); cursor: not-allowed; }

/* ─── Success ─── */
.success-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 36px 24px;
  text-align: center; margin-bottom: 16px;
}
.success-icon {
  width: 64px; height: 64px; background: var(--green); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 18px; font-size: 32px; color: #fff;
  box-shadow: 0 0 28px rgba(16,185,129,0.3);
}
.success-card h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.success-card > p { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
.token-box {
  background: var(--bg-2); border-radius: 10px; padding: 14px;
  font-size: 12px; font-family: monospace; word-break: break-all;
  color: var(--accent); margin: 12px 0; text-align: left; line-height: 1.8;
}
.token-box-sub {
  font-size: 11px; color: var(--muted); margin-top: 4px;
}
.step-list {
  background: var(--bg-2); border-radius: 10px; padding: 16px 18px;
  font-size: 13px; color: var(--text); line-height: 2.2; text-align: left; margin: 12px 0;
}
.step-list strong { color: var(--accent); }
.note-tip {
  background: rgba(37,99,235,0.06); border: 1px solid rgba(37,99,235,0.15);
  border-radius: 10px; padding: 12px 14px; font-size: 12px;
  color: var(--accent); line-height: 1.8; margin-top: 12px; text-align: left;
}
.note-tip strong { color: var(--accent); }
.hidden { display: none !important; }
.error-msg { color: var(--red); font-size: 12px; margin-top: 8px; text-align: center; }
.foot-link { color: var(--accent); text-align: center; font-size: 12px; margin-top: 8px; }
</style>
</head>
<body>

<!-- Nav -->
<div class="nav">
  <div class="container nav-inner">
    <a href="/" class="nav-brand">
      <span class="nav-icon">L</span>
      <span>LANWatch</span>
    </a>
    <div class="nav-links">
      <a href="/">首页</a>
      <a href="/download">下载中心</a>
      <a href="/admin">管理后台</a>
    </div>
    <div class="nav-right">
      <a class="btn btn-secondary btn-sm" href="/">🏠 官网首页</a>
    </div>
  </div>
</div>

<div class="page-wrap" style="padding-top: 40px; padding-bottom: 40px;">

  <!-- 注册表单 -->
  <div id="view-form">
    <div class="reg-card">
      <h2>🏢 创建企业账号</h2>
      <div class="form-row">
        <label>企业名称 *</label>
        <input type="text" id="input-name" placeholder="例如：沧州艾欧特科技服务有限公司" value="">
      </div>
      <div class="form-row">
        <label>联系电话（选填）</label>
        <input type="tel" id="input-phone" placeholder="用于接收报警通知" value="">
      </div>
      <button class="btn-reg" id="btn-submit" onclick="doRegister()">立即注册</button>
      <p class="foot-link">已有账号？<a href="/mobile">直接登录</a></p>
    </div>
  </div>

  <!-- 注册成功 -->
  <div id="view-success" class="hidden">
    <div class="success-card">
      <div class="success-icon">✓</div>
      <h2>注册成功！</h2>
      <p>请保存好您的 Token（下次登录手机端需要）</p>
      <div class="token-box" id="show-token"></div>
      <div class="token-box-sub" id="show-agent-id"></div>
      <button class="btn-reg" id="btn-copy" onclick="copyAndDownload()">复制 Token → 下载安装包</button>
    </div>

    <div class="reg-card">
      <h2>📋 安装后做什么</h2>
      <div class="step-list">
        1. 下载并运行安装包<br>
        2. 填写企业名称完成注册<br>
        3. 返回此页面点击「复制 Token」<br>
        4. 打开 <a href="/mobile" style="color:var(--accent);">手机端</a> 粘贴 Token 登录
      </div>
      <div class="note-tip">
        💡 <strong>提示：</strong>Token 是您唯一的登录凭证，丢失后无法找回，请妥善保存。
      </div>
    </div>
  </div>

</div>

<!-- Footer -->
<footer>
  <div class="container">
    <a href="/">官网首页</a> ·
    <a href="/download">下载中心</a> ·
    <a href="/admin">管理后台</a> ·
    <a href="/monitor">监控面板</a>
  </div>
</footer>

<script>
var SERVER = location.origin;
var REGISTERED_TOKEN = null;

async function doRegister() {
  var name = document.getElementById('input-name').value.trim();
  var phone = document.getElementById('input-phone').value.trim();
  if (!name) { alert('请填写企业名称'); return; }

  var btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.textContent = '注册中...';

  try {
    var resp = await fetch(SERVER + '/api/register', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name: name, phone: phone})
    });
    var data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || '注册失败');

    REGISTERED_TOKEN = data.token;
    document.getElementById('show-token').textContent = data.token;
    if (data.agent_id) {
      document.getElementById('show-agent-id').textContent = '设备ID：' + data.agent_id;
    }
    document.getElementById('view-form').classList.add('hidden');
    document.getElementById('view-success').classList.remove('hidden');
  } catch(e) {
    alert('注册失败: ' + e.message);
    btn.disabled = false;
    btn.textContent = '立即注册';
  }
}

function copyAndDownload() {
  var token = document.getElementById('show-token').textContent;
  navigator.clipboard.writeText(token).then(function() {
    window.location.href = '/client.exe';
  }).catch(function() {
    prompt('复制以下 Token 后将自动下载安装包：', token);
    window.location.href = '/client.exe';
  });
}
</script>
</body>
</html>
