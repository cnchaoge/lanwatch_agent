<!DOCTYPE html>
<html lang="zh" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LANWatch - 监控面板</title>
<link rel="stylesheet" href="/static/theme.css">
<style>
/* ─── Override theme for this page ─── */
body {
  background:
    radial-gradient(circle at top left, rgba(37,99,235,0.07) 0%, transparent 40%),
    radial-gradient(circle at bottom right, rgba(99,102,241,0.04) 0%, transparent 40%),
    var(--bg);
}

/* ─── Page header ─── */
.page-header {
  padding: 0 0 24px 0;
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 12px;
}
.page-header h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.03em; }
.page-header p { font-size: 13px; color: var(--muted); }
.header-actions { display: flex; align-items: center; gap: 8px; }

/* ─── Agent card ─── */
.agent-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 20px 22px;
  transition: background var(--transition), border-color var(--transition);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
}
.agent-card:hover { background: var(--surface-hover); }
.card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 4px; }
.card-name { font-size: 16px; font-weight: 700; }
.card-id { font-size: 10px; color: var(--muted); font-family: "Menlo", monospace; margin-top: 2px; }
.card-meta { font-size: 12px; color: var(--muted); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

/* ─── Metrics grid ─── */
.metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; }
.metric-row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 0; border-top: 1px solid var(--border); font-size: 13px;
}
.metric-row:first-child { border-top: none; padding-top: 0; }
.metric-label { color: var(--muted); min-width: 48px; font-size: 12px; }
.metric-value { display: flex; flex-wrap: wrap; gap: 5px; margin-left: auto; font-weight: 600; font-size: 12px; }

/* ─── Card footer ─── */
.card-footer {
  display: flex; align-items: center; gap: 10px;
  margin-top: 14px; padding-top: 14px;
  border-top: 1px solid var(--border);
}
.qr-img {
  width: 52px; height: 52px; border: 1px solid var(--border);
  border-radius: 8px; flex-shrink: 0;
}
.qr-info { display: flex; flex-direction: column; gap: 3px; font-size: 12px; }
.qr-info .label { color: var(--muted); }
.qr-info .link { color: var(--primary); cursor: pointer; }
.qr-info .link:hover { text-decoration: underline; }
.card-link {
  margin-left: auto; font-size: 13px; color: var(--primary);
  font-weight: 600; white-space: nowrap;
}
.card-link:hover { opacity: 0.8; }

/* ─── Grid layout ─── */
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }

/* ─── Note banner ─── */
.note-banner {
  padding: 12px 16px; border-radius: var(--radius);
  background: var(--yellow-dim); border: 1px solid rgba(251,191,36,0.2);
  font-size: 13px; color: var(--yellow); margin-bottom: 20px;
  display: flex; align-items: center; gap: 8px;
}

/* ─── Section ─── */
.section { padding: 40px 0; }

/* ─── Info box ─── */
.info-box {
  background: var(--primary-dim); border: 1px solid rgba(79,142,247,0.2);
  border-radius: var(--radius); padding: 14px 18px;
  font-size: 13px; color: var(--primary); line-height: 1.7;
}

/* ─── SNMP Card ─── */
.snmp-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 18px 22px;
  transition: background var(--transition), border-color var(--transition);
}
.snmp-card:hover { background: var(--surface-hover); }
.snmp-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
.snmp-card-name { font-size: 15px; font-weight: 700; }
.snmp-card-ip { font-size: 11px; color: var(--muted); font-family: 'Menlo', monospace; margin-top: 2px; }
.snmp-card-body { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px; }
.snmp-metric { display: flex; align-items: center; gap: 6px; font-size: 12px; padding: 6px 0; border-top: 1px solid var(--border); }
.snmp-metric:first-child { border-top: none; padding-top: 0; }
.snmp-metric-label { color: var(--muted); min-width: 42px; }
.snmp-metric-val { font-weight: 600; }
.snmp-section { margin-top: 40px; }
.snmp-section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.snmp-section-header h2 { font-size: 16px; font-weight: 700; color: var(--text); }
.snmp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }

@media (max-width: 640px) {
  .metrics-grid { grid-template-columns: 1fr; }
  .snmp-card-body { grid-template-columns: 1fr; }
  .snmp-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="nav">
  <div class="container nav-inner">
    <a href="/" class="nav-brand">
      <span class="nav-icon">L</span>
      <span>LANWatch</span>
    </a>
    <div class="nav-links">
      <a href="/">首页</a>
      <a href="/download">下载</a>
      <a href="/admin">管理后台</a>
    </div>
    <div class="nav-right">
      <button class="theme-toggle" id="themeToggle" title="切换主题">🌙</button>
      <a class="btn btn-primary btn-sm" href="/download">下载客户端</a>
    </div>
  </div>
</div>

<div class="container section">
  <div class="page-header">
    <div>
      <h1>网络监控面板</h1>
      <p id="server-info">实时监测 · 数据自动刷新</p>
    </div>
    <div class="header-actions">
      <button class="btn btn-secondary btn-sm" onclick="load()">🔄 刷新</button>
      <a class="btn btn-secondary btn-sm" href="/download">📥 下载安装包</a>
    </div>
  </div>

  <div id="note-banner" class="note-banner" style="display:none">
    💡 当前显示的是旧版监控面板，
    <a href="/" style="color:var(--yellow);text-decoration:underline;">点击访问新版官网</a>
    查看完整介绍。
  </div>

  <div id="grid" class="cards-grid"></div>

  <div class="snmp-section" id="snmp-section" style="display:none">
    <div class="snmp-section-header">
      <h2>📊 SNMP 监控设备</h2>
    </div>
    <div id="snmp-grid" class="snmp-grid"></div>
  </div>
</div>

<div class="footer">
  <div class="container">
    <a href="/">官网首页</a> ·
    <a href="/download">下载中心</a> ·
    <a href="/admin">管理后台</a> ·
    LANWatch · © 2026
  </div>
</div>

<script>
var SERVER = location.origin;
document.getElementById('server-info').textContent = SERVER + ' · 实时监测 · 数据自动刷新';

function metricDot(v, warn, crit) {
  if (v == null || isNaN(v)) return { dot: 'dot-grey', val: 'val-grey', text: '-' };
  var rounded = Math.round(v * 10) / 10;
  if (v >= crit) return { dot: 'dot-red', val: 'val-red', text: rounded };
  if (v >= warn) return { dot: 'dot-yellow', val: 'val-yellow', text: rounded };
  return { dot: 'dot-green', val: 'val-green', text: rounded };
}

function tagHTML(cls, text) {
  return '<span class="tag ' + cls + '">' + text + '</span>';
}

function timeAgo(ts) {
  if (!ts) return '无数据';
  var s = Math.floor(Date.now()/1000 - ts);
  if (s < 60) return s + '秒前';
  if (s < 3600) return Math.floor(s/60) + '分钟前';
  return Math.floor(s/3600) + '小时前';
}

function copyText(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function() { alert('链接已复制'); });
  } else {
    prompt('复制链接:', text);
  }
}

function load() {
  var grid = document.getElementById('grid');
  grid.innerHTML = '<div class="empty" style="padding:60px;">加载中...</div>';

  var xhr = new XMLHttpRequest();
  xhr.open('GET', SERVER + '/api/agents', true);
  xhr.onload = function() {
    try {
      var agents = JSON.parse(xhr.responseText);
      if (!agents.length) {
        grid.innerHTML = '<div class="empty" style="padding:60px;">暂无设备，<a href="/download" style="color:var(--primary)">点击下载客户端</a>安装后即可开始监控。</div>';
        return;
      }

      var html = '';
      agents.forEach(function(agent) {
        var xhr2 = new XMLHttpRequest();
        xhr2.open('GET', SERVER + '/api/' + agent.id + '/latest', false);
        xhr2.send(null);
        var latest = null;
        if (xhr2.status === 200) {
          try { latest = JSON.parse(xhr2.responseText); } catch(e) {}
        }
        var isOnline = latest && (Date.now()/1000 - latest.timestamp) < 300;
        var ago = latest ? timeAgo(latest.timestamp) : '无数据';
        var statusHTML = isOnline
          ? '<span class="dot dot-green"></span><span class="tag tag-green">在线</span>'
          : '<span class="dot dot-red"></span><span class="tag tag-red">离线</span>';

        var pRtt = latest ? latest.ping_rtt_ms : null;
        var pLoss = latest ? latest.ping_loss_pct : null;
        var dns = latest ? latest.dns_ms : null;
        var dnsAli = latest ? latest.dns_ms_ali : null;
        var dnsTencent = latest ? latest.dns_ms_tencent : null;
        var dns163 = latest ? latest.dns_ms_163 : null;
        var tgtRtt = latest ? latest.target_rtt_ms : null;
        var tgtOk = latest ? latest.target_reachable : null;
        var tgtName = latest ? (latest.target_name || '目标') : '目标';
        var mobileUrl = SERVER + '/mobile?id=' + agent.id;
        var qrUrl = SERVER + '/api/qr?text=' + encodeURIComponent(mobileUrl);

        // ICMP display
        var icmpTag;
        if (pRtt == null && dns != null) {
          icmpTag = tagHTML('tag-grey', 'ICMP不支持');
        } else if (pLoss > 0) {
          icmpTag = tagHTML('tag-yellow', '丢包' + pLoss + '%');
        } else if (pRtt != null) {
          icmpTag = tagHTML('tag-green', 'ICMP ' + pRtt + 'ms');
        } else {
          icmpTag = tagHTML('tag-grey', '不支持');
        }

        // DNS display
        var dnsTags = [];
        var servers = [['百度', dns], ['阿里', dnsAli], ['腾讯', dnsTencent], ['网易', dns163]];
        servers.forEach(function(s) {
          if (s[1] == null) return;
          var cls = s[1] < 50 ? 'tag-green' : (s[1] < 200 ? 'tag-yellow' : 'tag-red');
          dnsTags.push(tagHTML(cls, s[0] + ' ' + s[1].toFixed(0)));
        });
        var dnsHTML = dnsTags.length ? dnsTags.join(' ') : tagHTML('tag-grey', '-');

        // Target display
        var tgtTag;
        if (tgtOk === false) {
          tgtTag = tagHTML('tag-red', tgtName + ' 不可达');
        } else if (tgtRtt != null) {
          var cls = tgtRtt < 100 ? 'tag-green' : (tgtRtt < 300 ? 'tag-yellow' : 'tag-red');
          tgtTag = tagHTML(cls, tgtName + ' ' + tgtRtt + 'ms');
        } else {
          tgtTag = tagHTML('tag-grey', tgtName + ' -');
        }

        html += '<div class="agent-card">' +
          '<div class="card-top">' +
            '<div>' +
              '<div class="card-name">' + (agent.customer_name || agent.name) + '</div>' +
              '<div class="card-id">' + agent.id + '</div>' +
            '</div>' +
            statusHTML +
          '</div>' +
          '<div class="card-meta">' +
            '<span>' + (agent.name || '-') + '</span>·<span>' + ago + '</span>' +
          '</div>' +
          '<div class="metrics-grid">' +
            '<div class="metric-row"><span class="metric-label">DNS</span><span class="metric-value">' + dnsHTML + '</span></div>' +
            '<div class="metric-row"><span class="metric-label">ICMP</span><span class="metric-value">' + icmpTag + '</span></div>' +
            '<div class="metric-row" style="grid-column:1/-1;">' +
              '<span class="metric-label">' + tgtName + '</span>' +
              '<span class="metric-value">' + tgtTag + '</span>' +
            '</div>' +
          '</div>' +
          '<div class="card-footer">' +
            '<img class="qr-img" src="' + qrUrl + '" alt="二维码">' +
            '<div class="qr-info">' +
              '<span class="label">手机扫码查看</span>' +
              '<span class="link" onclick="copyText(\'' + mobileUrl + '\')">复制链接</span>' +
            '</div>' +
            '<a class="card-link" href="/agent/' + agent.id + '">详情 →</a>' +
          '</div>' +
        '</div>';
      });
      grid.innerHTML = html || '<div class="empty">无数据</div>';
    } catch(e) {
      grid.innerHTML = '<div class="empty">数据加载失败: ' + e.message + '</div>';
    }
  };
  xhr.onerror = function() {
    grid.innerHTML = '<div class="empty">网络请求失败，请检查服务端连接</div>';
  };
  xhr.send(null);
}

load();
loadSNMP();

function loadSNMP() {
  var snmpGrid = document.getElementById('snmp-grid');
  var snmpSection = document.getElementById('snmp-section');
  var xhr = new XMLHttpRequest();
  xhr.open('GET', SERVER + '/api/snmp/latest', true);
  xhr.onload = function() {
    if (xhr.status !== 200) { snmpSection.style.display = 'none'; return; }
    try {
      var devices = JSON.parse(xhr.responseText);
      if (!devices || devices.length === 0) { snmpSection.style.display = 'none'; return; }
      snmpSection.style.display = 'block';
      var html = '';
      devices.forEach(function(dev) {
        var m = dev.metrics || {};
        var statusDot = dev.status === 'online'
          ? '<span class="dot dot-green"></span>'
          : (dev.status === 'offline' ? '<span class="dot dot-red"></span>' : '<span class="dot dot-grey"></span>');

        var cpuKeys = Object.keys(m).filter(function(k) { return k.startsWith('hrProcessorLoad'); });
        var cpuVal = cpuKeys.length ? m[cpuKeys[0]] : null;
        var cpuTag = cpuVal != null
          ? (cpuVal > 80 ? tagHTML('tag-red', cpuVal + '%') : cpuVal > 50 ? tagHTML('tag-yellow', cpuVal + '%') : tagHTML('tag-green', cpuVal + '%'))
          : tagHTML('tag-grey', '-');

        var ifIn = Object.keys(m).filter(function(k) { return k.startsWith('ifInOctets'); });
        var ifCount = ifIn.length;

        var upVal = m['sysUpTime'];
        var upTag;
        if (upVal != null) {
          var secs = Math.floor(upVal / 100);
          var days = Math.floor(secs / 86400);
          var hrs = Math.floor((secs % 86400) / 3600);
          upTag = tagHTML('tag-green', days > 0 ? days + '天' + hrs + '时' : hrs + '时');
        } else {
          upTag = tagHTML('tag-grey', '-');
        }

        var statusTag = dev.status === 'online'
          ? tagHTML('tag-green', '在线')
          : dev.status === 'offline'
            ? tagHTML('tag-red', '离线')
            : tagHTML('tag-grey', dev.status || '-');

        var lastPoll = dev.last_poll ? timeAgo(dev.last_poll) : '-';

        html += '<a class="snmp-card" href="/snmp/' + dev.id + '" style="text-decoration:none;color:inherit;">' +
          '<div class="snmp-card-header">' +
            '<div>' +
              '<div class="snmp-card-name">' + (dev.name || dev.ip) + '</div>' +
              '<div class="snmp-card-ip">' + dev.ip + '</div>' +
            '</div>' +
            statusDot + ' ' + statusTag +
          '</div>' +
          '<div class="snmp-card-body">' +
            '<div class="snmp-metric"><span class="snmp-metric-label">CPU</span><span class="snmp-metric-val">' + cpuTag + '</span></div>' +
            '<div class="snmp-metric"><span class="snmp-metric-label">接口</span><span class="snmp-metric-val">' + tagHTML('tag-grey', ifCount + ' 个') + '</span></div>' +
            '<div class="snmp-metric"><span class="snmp-metric-label">运行</span><span class="snmp-metric-val">' + upTag + '</span></div>' +
            '<div class="snmp-metric"><span class="snmp-metric-label">轮询</span><span class="snmp-metric-val">' + tagHTML('tag-grey', lastPoll) + '</span></div>' +
          '</div>' +
        '</a>';
      });
      snmpGrid.innerHTML = html;
    } catch(e) { snmpSection.style.display = 'none'; }
  };
  xhr.onerror = function() { snmpSection.style.display = 'none'; };
  xhr.send(null);
}

var es = null;
function connectSSE() {
  es = new EventSource(SERVER + '/api/events');
  es.onmessage = function(e) {
    try {
      var data = JSON.parse(e.data);
      if (data.type === 'refresh') load();
    } catch(err) {}
  };
  es.onerror = function() {
    es.close(); es = null;
    setTimeout(connectSSE, 5000);
  };
}
connectSSE();
setInterval(load, 30000);

/* Theme toggle */
var toggle = document.getElementById('themeToggle');
var stored = localStorage.getItem('lw-theme') || 'light';
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  toggle.textContent = t === 'dark' ? '🌙' : '☀️';
  localStorage.setItem('lw-theme', t);
}
applyTheme(stored);
toggle.addEventListener('click', function() {
  applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
});
</script>
</body>
</html>
