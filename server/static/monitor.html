<!DOCTYPE html>
<html lang="zh" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LANWatch - 监控面板</title>
<link rel="stylesheet" href="/static/theme.css">
<style>
body { background: var(--bg); color: var(--text); }

/* ─── Page header ─── */
.page-header {
  padding: 0 0 20px 0;
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 12px;
}
.page-header h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; }
.header-right { display: flex; align-items: center; gap: 10px; }

/* ─── Grid ─── */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }

/* ─── Card ─── */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 18px 20px; margin-bottom: 16px;
  backdrop-filter: blur(12px);
}
[data-theme="dark"] .card { background: rgba(255,255,255,0.05); }
.card-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.card-meta { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
.online { color: var(--green); } .offline { color: var(--red); }

/* ─── Metrics ─── */
.metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px; margin: 10px 0; }
.metric-item { display: flex; align-items: center; gap: 6px; font-size: 13px; }
.metric-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.dot-green { background: var(--green); box-shadow: 0 0 5px rgba(74,222,128,0.5); }
.dot-orange { background: var(--orange); }
.dot-red { background: var(--red); box-shadow: 0 0 5px rgba(239,68,68,0.5); }
.dot-grey { background: var(--muted); }
.dot-yellow { background: var(--orange); }
.metric-label { color: var(--muted); min-width: 50px; font-size: 12px; }
.metric-value { font-weight: 600; font-size: 12px; margin-left: auto; }
.val-green { color: var(--green); }
.val-orange { color: var(--orange); }
.val-red { color: var(--red); }
.val-grey { color: var(--muted); }

/* ─── Card footer ─── */
.card-footer { display: flex; align-items: center; gap: 10px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.qr-img { width: 56px; height: 56px; border: 1px solid var(--border); border-radius: 6px; flex-shrink: 0; }
.qr-text { display: flex; flex-direction: column; gap: 2px; }
.qr-label { font-size: 12px; color: var(--muted); }
.qr-btn { font-size: 12px; color: var(--primary); cursor: pointer; }
.qr-btn:hover { text-decoration: underline; }

/* ─── Section ─── */
.section-title { font-size: 16px; font-weight: 700; margin: 24px 0 12px; display: flex; align-items: center; gap: 8px; }

/* ─── Empty ─── */
.empty { text-align: center; padding: 48px; color: var(--muted); font-size: 14px; }

/* ─── Refresh btn ─── */
.refresh-btn {
  background: var(--primary); color: #fff; border: none; border-radius: var(--radius);
  padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer;
  transition: opacity 0.2s;
}
.refresh-btn:hover { opacity: 0.85; }
</style>
</head>
<body>

<!-- Nav -->
<div class="nav">
  <div class="container nav-inner">
    <a href="/" class="nav-brand">
      <span class="nav-icon">L</span>
      <span>LANWatch</span>
    </a>
    <div class="nav-links">
      <a href="/">首页</a>
      <a href="/download">下载中心</a>
      <a href="/monitor">监控面板</a>
      <a href="/ping_overview">断点检测</a>
    </div>
    <div class="nav-right">
      <button class="theme-toggle" id="themeToggle" title="切换主题">🌙</button>
      <a class="btn btn-secondary btn-sm" href="/">🏠 官网首页</a>
    </div>
  </div>
</div>

<div class="container" style="padding-top:28px;">
  <div class="page-header">
    <h1>📊 监控面板</h1>
    <div class="header-right">
      <button class="refresh-btn" onclick="load()">🔄 刷新</button>
      <a class="btn btn-primary btn-sm" href="/download">📥 下载客户端</a>
    </div>
  </div>

  <!-- 客户端监控 -->
  <div class="section-title">🎯 客户端监控</div>
  <div id="grid" class="grid" style="gap:16px;"></div>

  <!-- SNMP 设备监控 -->
  <div class="section-title">📦 SNMP 设备监控</div>
  <div id="snmp-grid" class="grid" style="gap:16px;"></div>
</div>

<!-- Footer -->
<div class="footer">
  <div class="container">
    <a href="/">官网首页</a> ·
    <a href="/download">下载中心</a> ·
    <a href="/admin">管理后台</a> ·
    <a href="/monitor">监控面板</a> ·
    <a href="/ping_overview">断点检测</a>
    <br><br>
    LANWatch · © 2026
  </div>
</div>

<script>
var SERVER = location.origin;

function metricDot(v, warn, crit) {
  if (v === null || v === undefined || isNaN(v)) return { dot: 'dot-grey', val: 'val-grey', text: '-' };
  var rounded = Math.round(v * 10) / 10;
  if (v >= crit) return { dot: 'dot-red', val: 'val-red', text: rounded };
  if (v >= warn) return { dot: 'dot-orange', val: 'val-orange', text: rounded };
  return { dot: 'dot-green', val: 'val-green', text: rounded };
}

function metricItem(v, warn, crit, label, unit) {
  var m = metricDot(v, warn, crit);
  var text = m.text === '-' ? '-' : m.text + (unit || '');
  return '<div class="metric-item">' +
    '<span class="metric-dot ' + m.dot + '"></span>' +
    '<span class="metric-label">' + label + '</span>' +
    '<span class="metric-value ' + m.val + '">' + text + '</span>' +
    '</div>';
}

function timeAgo(ts) {
  var s = Math.floor(Date.now()/1000 - ts);
  if (s < 60) return s + '秒前';
  if (s < 3600) return Math.floor(s/60) + '分钟前';
  return Math.floor(s/3600) + '小时前';
}

function copyText(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function() { alert('链接已复制'); });
  } else {
    prompt('复制链接:', text);
  }
}

function load() {
  var grid = document.getElementById('grid');
  grid.innerHTML = '<div class="empty">加载中...</div>';

  var xhr = new XMLHttpRequest();
  xhr.open('GET', SERVER + '/api/agents', true);
  xhr.onload = function() {
    try {
      var agents = JSON.parse(xhr.responseText);
      if (!agents.length) {
        grid.innerHTML = '<div class="empty">暂无设备</div>';
        return;
      }
      var html = '';
      agents.forEach(function(agent) {
        var xhr2 = new XMLHttpRequest();
        xhr2.open('GET', SERVER + '/api/' + agent.id + '/latest', false);
        xhr2.send(null);
        var latest = null;
        if (xhr2.status === 200) {
          try { latest = JSON.parse(xhr2.responseText); } catch(e) {}
        }
        var isOnline = latest && (Date.now()/1000 - latest.timestamp) < 300;
        var ago = latest ? timeAgo(latest.timestamp) : '无数据';
        var status = isOnline ? '<span class="online">● 在线</span>' : '<span class="offline">● 离线</span>';
        var pRtt = latest ? latest.ping_rtt_ms : null;
        var pLoss = latest ? latest.ping_loss_pct : null;
        var dns = latest ? latest.dns_ms : null;
        var dnsAli = latest ? latest.dns_ms_ali : null;
        var dnsTencent = latest ? latest.dns_ms_tencent : null;
        var dns163 = latest ? latest.dns_ms_163 : null;
        var tgtRtt = latest ? latest.target_rtt_ms : null;
        var tgtOk = latest ? latest.target_reachable : null;
        var tgtName = latest ? (latest.target_name || '目标') : '目标';
        var mobileUrl = SERVER + '/mobile?id=' + agent.id;
        var qrUrl = SERVER + '/api/qr?text=' + encodeURIComponent(mobileUrl);

        html += '<div class="card">' +
          '<div class="card-title">' + (agent.customer_name || agent.name) + ' ' + status + '</div>' +
          '<div class="card-meta">' + agent.name + ' · ' + ago + '</div>' +
          '<div class="metrics-grid">' +
            (function(){
              if (pRtt == null && dns != null) {
                return '<div class="metric-item"><span class="metric-dot dot-grey"></span><span class="metric-label">ICMP</span><span class="metric-value val-grey">不支持</span></div>';
              } else if (pLoss > 0) {
                return '<div class="metric-item"><span class="metric-dot dot-yellow"></span><span class="metric-label">ICMP</span><span class="metric-value" style="color:var(--orange)">丢包' + pLoss + '%</span></div>';
              } else {
                return '<div class="metric-item"><span class="metric-dot dot-green"></span><span class="metric-label">ICMP</span><span class="metric-value val-green">支持</span></div>';
              }
            })() +
            (function(){
              var items = [];
              var servers = [['百度', dns], ['阿里', dnsAli], ['腾讯', dnsTencent], ['网易', dns163]];
              for (var i = 0; i < servers.length; i++) {
                var v = servers[i][1];
                if (v == null) continue;
                var c = v < 100 ? 'val-green' : (v < 300 ? 'val-orange' : 'val-red');
                items.push('<span style="font-size:12px;color:var(--muted);">' + servers[i][0] + ':</span><span class="metric-value ' + c + '">' + v.toFixed(0) + '</span>');
              }
              if (!items.length) return '<div class="metric-item"><span class="metric-dot dot-grey"></span><span class="metric-label">DNS</span><span class="metric-value val-grey">-</span></div>';
              return '<div class="metric-item"><span class="metric-dot dot-green"></span><span class="metric-label" style="font-size:12px;">DNS</span>' + items.join(' <span style="color:var(--border)">|</span> ') + '</div>';
            })() +
            (tgtOk === false
              ? '<div class="metric-item"><span class="metric-dot dot-red"></span><span class="metric-label">' + tgtName + '</span><span class="metric-value val-red">不可达</span></div>'
              : metricItem(tgtRtt, 100, 300, tgtName, 'ms')) +
          '</div>' +
          '<div class="card-footer">' +
            '<img class="qr-img" src="' + qrUrl + '" alt="二维码">' +
            '<div class="qr-text">' +
              '<span class="qr-label">手机查看</span>' +
              '<span class="qr-btn" onclick="copyText(\'' + mobileUrl + '\')">复制链接</span>' +
            '</div>' +
            '<a class="qr-btn" href="/agent/' + agent.id + '" style="margin-left:auto;">详细信息 →</a>' +
          '</div>' +
          '</div>';
      });
      grid.innerHTML = html || '<div class="empty">无数据</div>';
    } catch(e) {
      grid.innerHTML = '<div class="empty">解析失败: ' + e.message + '</div>';
    }
  };
  xhr.onerror = function() {
    grid.innerHTML = '<div class="empty">网络请求失败</div>';
  };
  xhr.send(null);

  loadSnmp();
}

function loadSnmp() {
  var grid = document.getElementById('snmp-grid');
  grid.innerHTML = '<div class="empty">加载中...</div>';
  var xhr = new XMLHttpRequest();
  xhr.open('GET', SERVER + '/api/snmp/latest', true);
  xhr.onload = function() {
    try {
      var devices = JSON.parse(xhr.responseText);
      if (!devices || !devices.length) {
        grid.innerHTML = '<div class="empty">暂无 SNMP 设备</div>';
        return;
      }
      var html = '';
      devices.forEach(function(dev) {
        var m = dev.metrics || {};
        var status = dev.status === 1 ? '<span class="online">● 在线</span>' : '<span class="offline">● 离线</span>';
        var ago = dev.last_poll ? timeAgo(dev.last_poll) : '无数据';
        var typeIcon = {'router':'📡','switch':'🔌','server':'🖥','ap':'📶','other':'📦'}[dev.type] || '📦';
        var ifIn = m['ifInOctets'] ? formatBytes(parseInt(m['ifInOctets'])) : '-';
        var ifOut = m['ifOutOctets'] ? formatBytes(parseInt(m['ifOutOctets'])) : '-';
        var uptime = m['sysUpTime'] ? formatUptime(parseInt(m['sysUpTime'])) : '-';
        var cpu = m['hrProcessorLoad'] ? m['hrProcessorLoad'] + '%' : '-';
        var memUsed = m['hrStorageUsed'] ? formatBytes(parseInt(m['hrStorageUsed'])) : '-';
        var memTotal = m['hrStorageSize'] ? formatBytes(parseInt(m['hrStorageSize'])) : '-';
        html += '<div class="card">' +
          '<div class="card-title">' + typeIcon + ' ' + (dev.name || dev.ip) + ' ' + status + '</div>' +
          '<div class="card-meta">' + dev.ip + ' · ' + ago + '</div>' +
          '<div class="metrics-grid">' +
            metricItem(ifIn !== '-' ? parseInt(m['ifInOctets']) : null, null, null, '入流量', '') +
            metricItem(ifOut !== '-' ? parseInt(m['ifOutOctets']) : null, null, null, '出流量', '') +
            metricItem(uptime !== '-' ? uptime : null, null, null, '运行时间', '') +
            metricItem(cpu !== '-' ? parseInt(cpu) : null, 70, 90, 'CPU', '') +
            metricItem(memUsed !== '-' ? memUsed : null, null, null, '存储已用', '') +
            metricItem(memTotal !== '-' ? memTotal : null, null, null, '存储总量', '') +
          '</div>' +
          '</div>';
      });
      grid.innerHTML = html;
    } catch(e) {
      grid.innerHTML = '<div class="empty">解析失败: ' + e.message + '</div>';
    }
  };
  xhr.onerror = function() {
    grid.innerHTML = '<div class="empty">SNMP 数据获取失败</div>';
  };
  xhr.send(null);
}

function formatBytes(b) {
  if (b == null || isNaN(b)) return '-';
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  if (b < 1073741824) return (b/1048576).toFixed(1) + ' MB';
  return (b/1073741824).toFixed(2) + ' GB';
}

function formatUptime(ticks) {
  if (!ticks || isNaN(ticks)) return '-';
  var s = Math.floor(ticks / 100);
  if (s < 60) return s + '秒';
  if (s < 3600) return Math.floor(s/60) + '分';
  if (s < 86400) return Math.floor(s/3600) + '小时';
  return Math.floor(s/86400) + '天';
}

// Theme toggle
var toggle = document.getElementById('themeToggle');
var stored = localStorage.getItem('lw-theme') || 'light';
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  toggle.textContent = t === 'dark' ? '🌙' : '☀️';
  localStorage.setItem('lw-theme', t);
}
applyTheme(stored);
toggle.addEventListener('click', function() {
  applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
});

load();
var es = null;
var esClosed = false;
function connectSSE() {
  if (esClosed) return;
  es = new EventSource(SERVER + '/api/events');
  es.onmessage = function(e) {
    try {
      var data = JSON.parse(e.data);
      if (data.type === 'refresh') { load(); }
    } catch(err) {}
  };
  es.onerror = function() {
    es.close(); es = null;
    if (!esClosed) { setTimeout(connectSSE, 3000); }
  };
}
connectSSE();
setInterval(load, 30000);
</script>
</body>
</html>
