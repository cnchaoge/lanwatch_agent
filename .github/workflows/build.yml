name: Build Windows Agent

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
      attestations: write

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Check files
        run: |
          Write-Host "=== repo root ==="
          ls .
          Write-Host "=== agent/windows ==="
          ls ./agent/windows/

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r agent/windows/requirements.txt
          pip install pyinstaller

      - name: Build exe
        working-directory: agent/windows
        shell: pwsh
        run: |
          Write-Host "=== Python version ==="
          python --version
          Write-Host "=== PyInstaller version ==="
          pyinstaller --version
          Write-Host "=== Building ==="
          pyinstaller --clean lanwatch_agent.spec 2>&1
          Write-Host "=== Exit code: $LASTEXITCODE ==="
          ls dist/ 2>&1

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: lanwatch_agent-win
          path: agent/windows/dist/*.exe
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: agent/windows/dist/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
