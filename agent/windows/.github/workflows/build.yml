name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow pystray

      - name: Build EXE
        run: |
          pyinstaller lanwatch_agent.spec --noconfirm

      - name: Upload EXE to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = $env:GITHUB_REF -replace 'refs/tags/', ''
          # 如果 release 已存在则追加 asset，否则创建 release
          gh release view $tag --repo cnchaoge/lanwatch_agent 2>/dev/null && (
            gh release upload $tag dist/lanwatch_agent.exe --repo cnchaoge/lanwatch_agent --clobber
          ) || (
            gh release create $tag dist/lanwatch_agent.exe --repo cnchaoge/lanwatch_agent --title "v$(echo $tag | sed 's/^v//')" --notes "自动构建"
          )